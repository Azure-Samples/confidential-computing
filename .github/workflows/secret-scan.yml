name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - sov-example-1

jobs:
  scan:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run repository secret scan
        shell: pwsh
        run: ./scripts/pre-commit.ps1 -ScanMode all